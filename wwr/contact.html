<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Learn about our white water rafting adventures, history, and mission.">
  <meta name="author" content="Testimony Ezekwe">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Rafting Company</title>

<meta name="description" content="Contact our rafting company for inquiries, reservations, and adventure planning. Get in touch with our team today.">

  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/logo.png" alt="Rafting Logo" class="logo">

  <nav class="main-nav">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>

  <h1>Contact Us</h1>

  <!-- Company Information -->
  <section class="contact-info">
    <h2>Company Information</h2>
    <p><strong>Address:</strong> 123 River Lane, Adventure City</p>
    <p><strong>Phone:</strong> +1 234 567 890</p>
    <p><strong>Email:</strong> info@raftingcompany.com</p>

    <!-- Google Map -->
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18..."
      width="300" 
      height="200" 
      allowfullscreen="" 
      loading="lazy">
    </iframe>
  </section>

  <!-- Employee Profiles -->
  <section class="employees">
    <h2>Meet Our Team</h2>

    <figure>
      <img src="images/employee1.jpg" alt="John - Guide">
      <figcaption>John – River Guide</figcaption>
    </figure>

    <figure>
      <img src="images/employee2.jpg" alt="Sarah - Manager">
      <figcaption>Sarah – Operations Manager</figcaption>
    </figure>

    <figure>
      <img src="images/employee3.jpg" alt="Mike - Instructor">
      <figcaption>Mike – Safety Instructor</figcaption>
    </figure>
  </section>

  <!-- Contact Form -->
  <section class="contact-form">
    <h2>Send Us a Message</h2>

    <form>

      <!-- Name -->
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" required>

      <!-- Email -->
      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" required>

      <!-- Purpose -->
      <p>Purpose of Message:</p>

      <label>
        <input type="radio" name="purpose" value="general" required>
        General Inquiry
      </label>

      <label>
        <input type="radio" name="purpose" value="reservation">
        Reservation Question
      </label>

      <label>
        <input type="radio" name="purpose" value="suggestion">
        Website Suggestion
      </label>

      <!-- Message -->
      <label for="message">Message:</label>
      <textarea id="message" name="message" required></textarea>

      <!-- Newsletter -->
      <label>
        <input type="checkbox" name="subscribe">
        Please subscribe me to the monthly newsletter
      </label>

      <!-- Submit -->
      <button type="submit">Send Message</button>

    </form>
  </section>

</main>
  
<footer>
  <p>&copy; 2026 White Water Rafting Co. | Testimony Ezekwe</p>

  <div class="social">
    <img src="images/facebook.png" alt="Facebook">
    <img src="images/twitter.png" alt="Twitter">
    <img src="images/instagram.png" alt="Instagram">
  </div>
</footer>

</body>
</html>
